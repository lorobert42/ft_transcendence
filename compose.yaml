services:
  frontend:
    image: ft_transcendence/frontend
    container_name: ft_transcendence_frontend
    build:
      context: frontend/
      dockerfile: Dockerfile
    expose:
      - 80
    networks:
      - ft_transcendence_network
    depends_on:
      - backend
  
  backend:
    image: ft_transcendence/backend
    container_name: ft_transcendence_backend
    build:
      context: backend/
      dockerfile: Dockerfile
    expose:
      - 8000
    networks:
      - ft_transcendence_network
    depends_on:
      database:
        condition: service_healthy
    
  nginx:
    image: ft_transcendence/reverse_proxy
    container_name: ft_transcendence_reverse_proxy
    build:
      context: reverse_proxy
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    networks:
      - ft_transcendence_network
    depends_on:
      - backend

  database:
    image: ft_transcendence/database
    container_name: ft_transcendence_database
    build:
      context: database
      dockerfile: Dockerfile
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - ft_transcendence_network
    volumes:
      - database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  prometheus:
    image: ft_transcendence/prometheus
    container_name: ft_transcendence_prometheus
    build:
      context: prometheus
      dockerfile: Dockerfile
    ports:
      - 9090:9090
    networks:
      - ft_transcendence_network
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - grafana
  
  grafana:
    image: grafana/grafana-oss
    container_name: ft_transcendence_grafana
    ports:
      - 3000:3000
    networks:
      - ft_transcendence_network
    volumes:
      - grafana-data:/var/lib/grafana

networks:
  ft_transcendence_network:

volumes:
  database-data:
  grafana-data:
  prometheus-data: