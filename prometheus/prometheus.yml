scrape_configs:
- job_name: prometheus
  scrape_interval: 1m
  static_configs:
  - targets:
    - 127.0.0.1:9090

- job_name: node_exporter
  scrape_interval: 5s
  static_configs:
  - targets:
    - ft_transcendence_reverse_proxy:9100
    - ft_transcendence_backend:9100
    - ft_transcendence_frontend:9100
    - ft_transcendence_database:9100

remote_write:
- url: http://ft_transcendence_grafana