[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:django]
command=/usr/local/bin/python ./api/manage.py runserver 0.0.0.0:8000
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:node_exporter]
command=/node_exporter
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true