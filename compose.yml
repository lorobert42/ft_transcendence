version: "3.9"

services:
  frontend:
    # image: ft_transcendence/frontend
    container_name: ft_transcendence_frontend
    build:
      context: frontend/
      dockerfile: Dockerfile
    expose:
      - 80
    networks:
      - ft_transcendence_network
    depends_on:
      - backend

  backend:
    build:
      context: backend/
      args:
        - DEV=true
    expose:
      - 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379

  nginx:
    # image: ./reverse_proxy
    container_name: reverse_proxy
    build:
      context: reverse_proxy
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    networks:
      - ft_transcendence_network
    depends_on:
      - backend

  db:
    image: postgres:13-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment: # sets initial db variables
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: always

networks:
  ft_transcendence_network:

volumes:
  dev-db-data:
